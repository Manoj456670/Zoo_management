spring.application.name=application

# 1. Use the Render environment variable, fallback to localhost for your PC
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/zoo_db}

# 2. Use Render credentials, fallback to 'root' for your PC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# 3. Dynamic Port: Render assigns a random port, while local uses 8080
server.port=${PORT:8080}

# Keep these as they are
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect