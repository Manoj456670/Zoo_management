spring.application.name=application
spring.main.allow-bean-definition-overriding=true
# Railway provides these variables automatically when linked
# Updated to match the name 'railway' found in your logs
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/railway}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Essential for cloud
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true